spring:
  application:
    name: job-portal


  datasource:
    url: jdbc:postgresql://localhost:5432/myappdb
    username: myuser
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

server:
  port: 8080